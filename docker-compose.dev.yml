services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clarifi
      POSTGRES_PASSWORD: clarifi_dev
      POSTGRES_DB: clarifi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clarifi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server /etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis.conf:/etc/redis/redis.conf
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: clarifi
      MINIO_ROOT_PASSWORD: clarifi_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 clarifi clarifi_dev;
      mc mb local/clarifi-uploads --ignore-existing;
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clarifi:clarifi_dev@postgres:5432/clarifi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: clarifi
      S3_SECRET_KEY: clarifi_dev
      S3_BUCKET: clarifi-uploads
      ENVIRONMENT: development
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend/app:/app/app
    environment:
      DATABASE_URL: postgresql+asyncpg://clarifi:clarifi_dev@postgres:5432/clarifi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: clarifi
      S3_SECRET_KEY: clarifi_dev
      S3_BUCKET: clarifi-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.workers.celery_app.WorkerSettings

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  minio_data: